name: Deploy to VPS

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  port: 22
                  script: |
                      cd /var/www/DentalPoint

                      # Discard any local changes and fetch latest
                      git reset --hard HEAD
                      git clean -fd
                      git fetch origin main
                      git reset --hard origin/main

                      # Install dependencies
                      npm install || exit 1

                      # Build with version timestamp
                      export NEXT_PUBLIC_IMAGE_VERSION=$(date +%s)
                      NODE_OPTIONS="--max-old-space-size=2048" NODE_ENV=production npm run build || exit 1

                      # Restart PM2
                      pm2 restart dentalpoint || pm2 start npm --name dentalpoint -- start

                      # Reload nginx
                      systemctl reload nginx || true

                      echo "✅ Deployment completed at $(date)"
