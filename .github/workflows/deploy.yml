name: Deploy to VPS

on:
    push:
        branches:
            - main
        paths-ignore:
            - '**.md'
            - '.gitignore'
            - 'LICENSE'

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  port: 22
                  script: |
                      cd /var/www/DentalPoint

                      # Discard local changes to tracked files and fetch latest.
                      # Admin-mutated content (data/*.json, public/Images/{certificates,gallery,owners})
                      # is gitignored and therefore untracked — git reset never touches it.
                      # Deliberately no `git clean -fd` here: it would delete that same untracked
                      # admin content. Build-cache dirs below are cleaned explicitly instead.
                      git reset --hard HEAD
                      git fetch origin main
                      git reset --hard origin/main

                      # Stop PM2 to prevent conflicts during cleanup
                      pm2 stop dentalpoint 2>/dev/null || true

                      # Clean previous build to avoid corruption (fixes webpack cache errors)
                      echo "🧹 Cleaning old build..."
                      rm -rf .next/cache 2>/dev/null || true
                      rm -rf .next 2>/dev/null || true
                      rm -rf node_modules/.cache 2>/dev/null || true
                      rm -rf .swc 2>/dev/null || true

                      # Install dependencies (npm ci, not npm install — exact, reproducible install
                      # from package-lock.json; npm install can silently rewrite the lockfile)
                      npm ci || exit 1

                      # Build
                      echo "🔨 Building Next.js..."
                      NODE_OPTIONS="--max-old-space-size=2048" NODE_ENV=production npm run build || exit 1

                      # Verify build succeeded
                      if [ ! -d ".next" ]; then
                          echo "❌ Build failed - .next directory not found"
                          exit 1
                      fi

                      # Check for critical build files
                      if [ ! -f ".next/BUILD_ID" ] || [ ! -d ".next/static" ]; then
                          echo "❌ Build incomplete - missing critical files"
                          exit 1
                      fi

                      # Restart PM2
                      pm2 restart dentalpoint || pm2 start npm --name dentalpoint -- start

                      # Wait for app to be ready
                      sleep 5

                      # Auto-apply Nginx config from repo
                      if [ -f "nginx.conf.dentalpoint" ]; then
                          echo "📝 Updating Nginx config..."
                          cp nginx.conf.dentalpoint /etc/nginx/sites-available/dentalpoint
                          nginx -t && systemctl reload nginx || echo "⚠️ Nginx config update failed"
                      else
                          echo "⚠️ nginx.conf.dentalpoint not found, skipping Nginx update"
                          nginx -t && systemctl reload nginx || echo "⚠️ Nginx reload failed"
                      fi

                      echo "✅ Deployment completed at $(date)"
