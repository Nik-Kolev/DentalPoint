name: Deploy to VPS

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  port: 22
                  script: |
                      cd /var/www/DentalPoint

                      # Discard any local changes and fetch latest
                      git reset --hard HEAD
                      git clean -fd
                      git fetch origin main
                      git reset --hard origin/main

                      # Clean previous build to avoid corruption
                      rm -rf .next
                      rm -rf node_modules/.cache

                      # Install dependencies
                      npm install || exit 1

                      # Build
                      NODE_OPTIONS="--max-old-space-size=2048" NODE_ENV=production npm run build || exit 1

                      # Verify build succeeded
                      if [ ! -d ".next" ]; then
                          echo "❌ Build failed - .next directory not found"
                          exit 1
                      fi

                      # Check for critical build files
                      if [ ! -f ".next/BUILD_ID" ] || [ ! -d ".next/static" ]; then
                          echo "❌ Build incomplete - missing critical files"
                          exit 1
                      fi

                      # Restart PM2
                      pm2 restart dentalpoint || pm2 start npm --name dentalpoint -- start

                      # Wait for app to be ready
                      sleep 5

                      # Reload nginx
                      nginx -t && systemctl reload nginx || echo "⚠️ Nginx reload failed"

                      echo "✅ Deployment completed at $(date)"
