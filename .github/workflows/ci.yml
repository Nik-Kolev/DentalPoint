name: CI

on:
    pull_request:
    push:
        branches: [develop, main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-typecheck-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run lint
            # next.config.js sets typescript.ignoreBuildErrors: true, so `npm run build`
            # alone does NOT catch type errors — this is the only step that does.
            - run: npx tsc --noEmit
            - run: npm run build
